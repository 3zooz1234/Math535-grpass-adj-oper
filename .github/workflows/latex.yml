name: Build LaTeX Documents
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX files
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            notes/note.tex
            slides/slides.tex
          work_in_root_file_dir: true